services:
  postgres:
    image: postgres:16
    container_name: training-diary-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: training_diary
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d training_diary"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
